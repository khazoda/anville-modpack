name: Build & Publish Modpack

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          # Download latest packwiz build from GitHub Actions artifacts
          wget -q "https://nightly.link/packwiz/packwiz/workflows/go/main/Linux%2064-bit%20x86.zip" -O packwiz.zip
          unzip -q packwiz.zip
          chmod +x packwiz
          sudo mv packwiz /usr/local/bin/
          echo "Installed packwiz. Running refresh..."
          packwiz refresh -y

      - name: Extract pack information
        id: pack_info
        run: |
          # Extract values from pack.toml
          NAME=$(grep -oP 'name\s*=\s*"\K[^"]+' pack.toml | tr ' ' '-')
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' pack.toml)
          MC_VERSION=$(grep -oP 'minecraft\s*=\s*"\K[^"]+' pack.toml)
          NEOFORGE_VERSION=$(grep -oP 'neoforge\s*=\s*"\K[^"]+' pack.toml)
          
          # Construct the output filename
          OUTPUT_FILE="${NAME}_${VERSION}+${MC_VERSION}.mrpack"
          
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT
          echo "neoforge_version=$NEOFORGE_VERSION" >> $GITHUB_OUTPUT
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
          
          echo "Building: $OUTPUT_FILE"

      - name: Build modpack
        run: |
          mkdir -p releases
          packwiz mr export -o "releases/${{ steps.pack_info.outputs.output_file }}"

      - name: Extract version-specific changelog
        run: |
          chmod +x .github/scripts/extract-changelog.sh
          .github/scripts/extract-changelog.sh "${{ steps.pack_info.outputs.version }}"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.pack_info.outputs.version }}
          name: Anville ${{ steps.pack_info.outputs.version }}
          body_path: current-changelog.md
          files: releases/${{ steps.pack_info.outputs.output_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          
          files: releases/${{ steps.pack_info.outputs.output_file }}
          
          name: Anville ${{ steps.pack_info.outputs.version }}
          version: ${{ steps.pack_info.outputs.version }}
          version-type: release
          
          loaders: neoforge
          game-versions: ${{ steps.pack_info.outputs.mc_version }}
          
          changelog-file: current-changelog.md
